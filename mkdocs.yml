site_name: Jobdone 使用指南
site_url: https://docs.jobdone.cc
site_description: Jobdone 工程現場與場域管理平台使用手冊

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  font:
    text: Noto Sans TC
    code: Roboto Mono
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/custom.css
extra_javascript:
  - javascripts/collapsible-nav.js

